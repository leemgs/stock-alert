name: Daily Stock Report (1-hour)

on:
  schedule:
    - cron: "0 */1 * * *"   # every 1 hour (UTC)
  workflow_dispatch: {}

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ 캐시 복원 (올바른 들여쓰기)
      - name: Restore history.json cache
        id: restore-history
        uses: actions/cache/restore@v4
        with:
          path: data/history.json
          key: ${{ runner.os }}-history-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-history-

      - name: Ensure history.json exists
        run: |
          mkdir -p data
          if [ ! -f data/history.json ]; then
            echo '{}' > data/history.json
          fi

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt



      - name: Run alerts
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST || vars.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER || vars.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS || vars.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM || vars.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || vars.EMAIL_TO }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || vars.SLACK_WEBHOOK_URL }}
          ACTIVE_START: ${{ secrets.ACTIVE_START || vars.ACTIVE_START }}
          ACTIVE_END: ${{ secrets.ACTIVE_END || vars.ACTIVE_END }}
        run: |
          python src/multi_stock_alert.py

      - name: Sync stock.txt back and commit
        if: always()
        run: |
          if ! git diff --quiet data/stock.txt; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add data/stock.txt
            git commit -m "[Stock Alert] Update thresholds (+/- 10%)"
            git push
          else
            echo "No changes in stock.txt"
          fi

      - name: Save history.json cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/history.json
          key: ${{ runner.os }}-history-${{ github.run_number }}
