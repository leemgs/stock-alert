name: Daily Stock Report (1-hour)

on:
  schedule:
    - cron: "0 */1 * * *"   # every 1 hour (UTC)
  workflow_dispatch: {}

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ 캐시 복원 (올바른 들여쓰기)
      - name: Restore history.json cache
        id: restore-history
        uses: actions/cache/restore@v4
        with:
          path: data/history.json
          key: ${{ runner.os }}-history-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-history-

      - name: Ensure history.json exists
        run: |
          mkdir -p data
          if [ ! -f data/history.json ]; then
            echo '{}' > data/history.json
          fi

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt



      - name: Run alerts
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS || vars.SMTP_PASS }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || vars.SLACK_WEBHOOK_URL }}
        run: |
          python src/multi_stock_alert.py

      # 대시보드(docs/)용 시세/이력 데이터 갱신 — 실패해도 알림 파이프라인은 유지
      - name: Generate dashboard data
        if: always()
        continue-on-error: true
        run: |
          python src/generate_dashboard_data.py

      - name: Sync stock.txt & dashboard data back and commit
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/stock.txt docs/data/history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[Stock Alert] Update thresholds & dashboard data"
            git push
          fi

      - name: Save history.json cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/history.json
          key: ${{ runner.os }}-history-${{ github.run_number }}
