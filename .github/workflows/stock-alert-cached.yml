name: Stock Alerts (1-hour)

on:
  schedule:
    - cron: "0 */1 * * *"   # every 1 hour (UTC)
  workflow_dispatch: {}

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ 캐시 복원 (올바른 들여쓰기)
      - name: Restore history.json cache
        id: restore-history
        uses: actions/cache/restore@v4
        with:
          path: data/history.json
          key: ${{ runner.os }}-history-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-history-

      - name: Ensure history.json exists
        run: |
          mkdir -p data
          if [ ! -f data/history.json ]; then
            echo '{}' > data/history.json
          fi

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt



      - name: Build config from secrets
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST || vars.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER || vars.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS || vars.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM || vars.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || vars.EMAIL_TO }}
          SLACK_ENABLE: ${{ secrets.SLACK_ENABLE || vars.SLACK_ENABLE }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || vars.SLACK_WEBHOOK_URL }}
          SLACK_SPLIT_CHANNELS: ${{ secrets.SLACK_SPLIT_CHANNELS || vars.SLACK_SPLIT_CHANNELS }}
          SLACK_WEBHOOK_DOWN: ${{ secrets.SLACK_WEBHOOK_DOWN || vars.SLACK_WEBHOOK_DOWN }}
          SLACK_WEBHOOK_UP: ${{ secrets.SLACK_WEBHOOK_UP || vars.SLACK_WEBHOOK_UP }}
          SLACK_WEBHOOK_REPORT: ${{ secrets.SLACK_WEBHOOK_REPORT || vars.SLACK_WEBHOOK_REPORT }}
          TZV: ${{ secrets.TZ || vars.TZ }}
          ACTIVE_WINDOW_ENABLE: ${{ secrets.ACTIVE_WINDOW_ENABLE || vars.ACTIVE_WINDOW_ENABLE }}
          ACTIVE_START: ${{ secrets.ACTIVE_START || vars.ACTIVE_START }}
          ACTIVE_END: ${{ secrets.ACTIVE_END || vars.ACTIVE_END }}
          ACTIVE_BUSINESS_DAYS_ONLY: ${{ secrets.ACTIVE_BUSINESS_DAYS_ONLY || vars.ACTIVE_BUSINESS_DAYS_ONLY }}
          ALERT_RATE_LIMIT_PER_TICKER_PER_DAY: ${{ secrets.ALERT_RATE_LIMIT_PER_TICKER_PER_DAY || vars.ALERT_RATE_LIMIT_PER_TICKER_PER_DAY }}
          ALERT_MIN_INTERVAL_MINUTES: ${{ secrets.ALERT_MIN_INTERVAL_MINUTES || vars.ALERT_MIN_INTERVAL_MINUTES }}
          ALERT_GLOBAL_DAILY_CAP: ${{ secrets.ALERT_GLOBAL_DAILY_CAP || vars.ALERT_GLOBAL_DAILY_CAP }}
        run: |
          cat > data/config.txt <<EOF
          SMTP_HOST=${SMTP_HOST}
          SMTP_PORT=${SMTP_PORT}
          SMTP_USER=${SMTP_USER}
          SMTP_PASS=${SMTP_PASS}
          EMAIL_FROM=${EMAIL_FROM}
          EMAIL_TO=${EMAIL_TO}
          TZ=${TZV:-Asia/Seoul}

          DAILY_DEDUP=true
          ALERT_ON_CROSSDOWN_ONLY=false
          ALERT_ON_CROSSUP_ONLY=false

          SLACK_ENABLE=${SLACK_ENABLE:-true}
          SLACK_USERNAME=Stock-Alert-Bot
          SLACK_ICON_EMOJI=:bar_chart:
          SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
          SLACK_SPLIT_CHANNELS=${SLACK_SPLIT_CHANNELS:-false}
          SLACK_WEBHOOK_DOWN=${SLACK_WEBHOOK_DOWN}
          SLACK_WEBHOOK_UP=${SLACK_WEBHOOK_UP}
          SLACK_WEBHOOK_REPORT=${SLACK_WEBHOOK_REPORT}

          ACTIVE_WINDOW_ENABLE=${ACTIVE_WINDOW_ENABLE:-false}
          ACTIVE_TZ=${TZV:-Asia/Seoul}
          ACTIVE_BUSINESS_DAYS_ONLY=${ACTIVE_BUSINESS_DAYS_ONLY:-true}
          ACTIVE_START=${ACTIVE_START:-09:00}
          ACTIVE_END=${ACTIVE_END:-15:30}

          ALERT_RATE_LIMIT_PER_TICKER_PER_DAY=${ALERT_RATE_LIMIT_PER_TICKER_PER_DAY:-2}
          ALERT_MIN_INTERVAL_MINUTES=${ALERT_MIN_INTERVAL_MINUTES:-60}
          ALERT_GLOBAL_DAILY_CAP=${ALERT_GLOBAL_DAILY_CAP:-100}

          WEEKLY_REPORT_ENABLE=false
          WEEKLY_REPORT_TZ=${TZV:-Asia/Seoul}
          WEEKLY_REPORT_WHEN=6,18:00
          EOF

      - name: Run alerts
        run: |
          python src/multi_stock_alert.py

      - name: Sync stock.txt back and commit
        if: always()
        run: |
          if ! git diff --quiet data/stock.txt; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add data/stock.txt
            git commit -m "[Stock Alert] Update thresholds (+/- 10%)"
            git push
          else
            echo "No changes in stock.txt"
          fi

      - name: Save history.json cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/history.json
          key: ${{ runner.os }}-history-${{ github.run_number }}
